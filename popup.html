<!DOCTYPE html>
<html>
<head>
  <title>Script Keeper</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
      min-width: 260px;
    }
    .container {
      background: white;
      margin: 12px;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    h3 {
      font-size: 16px;
      margin: 0;
      color: #222;
    }
    #btnSettings {
      font-size: 18px;
      cursor: pointer;
      color: #888;
      text-decoration: none;
      line-height: 1;
      transition: color 0.2s;
    }
    #btnSettings:hover {
      color: #333;
    }
    button {
      width: 100%;
      margin: 6px 0;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: #3ecb60;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button:hover {
      background: #0078d4;
    }
    details {
      margin: 6px 0;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
    }
    summary {
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      padding: 8px 12px;
      color: #444;
      background: #f0f0f0;
      list-style: none;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    summary:hover {
      background: #e4e4e4;
    }
    summary::before {
      content: "▶";
      font-size: 10px;
      color: #888;
      transition: transform 0.15s ease;
      display: inline-block;
    }
    details[open] summary {
      border-bottom: 1px solid #e0e0e0;
    }
    details[open] summary::before {
      transform: rotate(90deg);
    }
    details > button,
    details button {
      margin: 6px 10px;
      width: calc(100% - 20px);
    }
    #status {
      display: none;
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
    }
    #status.success {
      display: block;
      background: #d4edda;
      color: #155724;
    }
    #status.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-row">
      <h3>Script Keeper</h3>
      <a id="btnSettings" title="Settings">&#9881;</a>
    </div>
    <div id="macro-buttons"></div>
    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
